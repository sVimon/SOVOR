<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVOR - سكريبت</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <div class="main-container">
        <div class="logo" data-text="SOVOR">SOVOR</div>

        <div class="input-group">
            <input type="text" id="userId" placeholder="أدخل الـ ID (10 أرقام)" maxlength="10" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <div class="input-glow"></div>
        </div>

        <button id="startBtn" class="btn-3d">
            <span class="btn-text">START</span>
        </button>

        <div class="conditions-box glass-panel">
            <div class="icon-warning">⚠️</div>
            <p>باش يخدم معاك سكريبت ضروري تفتح حساب بكود برومو <strong class="highlight">SOVOR</strong> وتشارجي 20dh او اكتر وتحط id ديال لحساب ديالك وغادي يتفعل ليك سكريبت مباشرة</p>
        </div>

        <div class="promo-section glass-panel">
            <span class="promo-text">Code promo : <span class="promo-code">SOVOR</span></span>
            <button id="copyBtn" class="btn-copy">نسخ</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content glass-panel">
            
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <div class="status-msg" id="statusMsg">جاري التحقق من الـ ID الخاص بك...</div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-glow"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <div class="error-state" id="errorState">
                <div class="error-icon">❌</div>
                <div class="error-msg">وقع خطأ ما، المرجو الإعادة أو التحقق من الشروط</div>
                <button id="closeModalBtn" class="btn-error">إغلاق</button>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
